<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CandyVerse 📦 My Orders</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    @keyframes cardIn   {from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes floatBob {0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
    @keyframes miniPulse{0%,100%{box-shadow:0 0 0 4px rgba(255,77,143,0.2)}50%{box-shadow:0 0 0 9px rgba(255,77,143,0.05)}}
    @keyframes trackGrad{0%{background-position:0%}50%{background-position:100%}100%{background-position:0%}}

    .mini-stepper{display:flex;align-items:flex-start;margin:1rem 0 .25rem;overflow-x:auto;padding-bottom:4px;}
    .mini-step{display:flex;flex-direction:column;align-items:center;flex:1;min-width:48px;position:relative;}
    .mini-step:not(:last-child)::after{content:'';position:absolute;top:13px;left:50%;width:100%;height:3px;background:rgba(255,77,143,0.15);z-index:0;}
    .mini-step.sd:not(:last-child)::after{background:linear-gradient(90deg,#FF1A6C,#FF80AB);}
    .mini-step.sa:not(:last-child)::after{background:linear-gradient(90deg,#FF80AB,rgba(255,77,143,0.15));}
    .mini-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.82rem;border:2px solid rgba(255,77,143,0.2);background:rgba(255,255,255,0.65);position:relative;z-index:1;flex-shrink:0;}
    .mini-step.sd .mini-dot{background:linear-gradient(135deg,#FF1A6C,#FF4D8F);border-color:#FF1A6C;box-shadow:0 2px 10px rgba(255,26,108,0.45);}
    .mini-step.sa .mini-dot{background:linear-gradient(135deg,#FF80AB,#FF4D8F);border-color:#FF4D8F;animation:miniPulse 1.8s ease-in-out infinite;}
    .mini-step.sp .mini-dot{opacity:.32;}
    .mini-label{font-size:.56rem;font-weight:800;text-align:center;margin-top:4px;line-height:1.2;max-width:48px;}
    .mini-step.sd .mini-label{color:#FF1A6C;}
    .mini-step.sa .mini-label{color:#FF4D8F;font-weight:900;}
    .mini-step.sp .mini-label{color:rgba(61,0,64,0.28);}

    .track-btn{display:flex;align-items:center;justify-content:center;gap:.6rem;width:100%;padding:.9rem;margin-top:.9rem;background:linear-gradient(135deg,#FF1A6C 0%,#FF4D8F 50%,#FF80AB 100%);background-size:200% auto;animation:trackGrad 3s ease infinite;color:#fff;border:none;border-radius:14px;font-family:'Fredoka One',cursive;font-size:1.05rem;text-decoration:none;cursor:pointer;box-shadow:0 4px 20px rgba(255,26,108,0.4);transition:transform .25s,box-shadow .25s;}
    .track-btn:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 8px 30px rgba(255,26,108,0.6);}
    .track-btn.dlv{background:linear-gradient(135deg,#00c853,#00875a);animation:none;box-shadow:0 4px 20px rgba(0,200,83,0.4);}
    .status-chip{display:inline-flex;align-items:center;gap:.4rem;border-radius:99px;padding:.35rem 1rem;font-weight:800;font-size:.85rem;border:2px solid;margin:.6rem 0 0;}
    .odet{display:none;margin-top:.75rem;}
    .odet.open{display:block;}
    .tog-btn{background:none;border:none;cursor:pointer;color:var(--text-muted);font-weight:800;font-size:.83rem;font-family:'Nunito',sans-serif;padding:0;display:flex;align-items:center;gap:.3rem;margin-top:.6rem;}
    .tog-btn:hover{color:var(--hot-pink);}
    .ph-gate{background:rgba(255,255,255,0.7);border:2px solid rgba(255,77,143,0.25);border-radius:20px;padding:2.5rem 2rem;max-width:420px;margin:2rem auto;text-align:center;backdrop-filter:blur(16px);box-shadow:0 12px 40px rgba(255,26,108,0.15);}
    .ph-gate h3{font-family:'Fredoka One',cursive;font-size:1.6rem;color:var(--text);margin-bottom:.5rem;}
    .ph-gate input{width:100%;box-sizing:border-box;padding:.8rem 1.2rem;border-radius:99px;border:2px solid rgba(255,77,143,0.35);font-family:'Nunito',sans-serif;font-size:1rem;font-weight:700;color:var(--text);outline:none;margin:.75rem 0;background:rgba(255,255,255,0.9);}
    .ph-gate input:focus{border-color:#FF1A6C;box-shadow:0 0 16px rgba(255,26,108,0.2);}
  </style>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="navbar-brand">🍭 CandyVerse</a>
  <ul class="navbar-links">
    <li><a href="products.html">🛍 Shop</a></li>
    <li><a href="cart.html" class="cart-badge">🛒 Cart <span class="badge" id="cart-count">0</span></a></li>
    <li><a href="orders.html" class="active">📦 Orders</a></li>
  </ul>
</nav>

<div class="page-header">
  <h1>📦 My Orders</h1>
  <p id="sub">Your sweet history</p>
</div>

<div class="orders-container" id="wrap"></div>

<script>
var STEPS=[
  {k:'Order Placed',     i:'📋',s:'Placed'   },
  {k:'Preparing',        i:'👨‍🍳',s:'Preparing'},
  {k:'Packed',           i:'📦',s:'Packed'   },
  {k:'Shipped',          i:'🚚',s:'Shipped'  },
  {k:'Out for Delivery', i:'🛵',s:'Near You' },
  {k:'Delivered',        i:'🎉',s:'Done!'    }
];
var CHIP={
  'Order Placed':    'background:rgba(0,180,255,0.1);border-color:rgba(0,180,255,0.45);color:#0055aa',
  'Preparing':       'background:rgba(255,143,0,0.1);border-color:rgba(255,143,0,0.45);color:#b34700',
  'Packed':          'background:rgba(224,64,251,0.1);border-color:rgba(224,64,251,0.45);color:#7a00b5',
  'Shipped':         'background:rgba(0,120,255,0.1);border-color:rgba(0,120,255,0.45);color:#003d99',
  'Out for Delivery':'background:rgba(255,26,108,0.1);border-color:rgba(255,26,108,0.45);color:#cc0044',
  'Delivered':       'background:rgba(0,200,83,0.1);border-color:rgba(0,200,83,0.45);color:#00875a'
};

var wrap=document.getElementById('wrap');
var sub=document.getElementById('sub');

// cart badge
try{var c=JSON.parse(localStorage.getItem('cv_cart')||'[]');var b=document.getElementById('cart-count');if(b)b.textContent=c.reduce(function(s,i){return s+i.qty;},0);}catch(e){}

// get saved phone
var phone='';
try{var chk=JSON.parse(localStorage.getItem('cv_checkout')||'{}');phone=chk.phone||'';}catch(e){}

if(phone){ load(phone); }
else     { gate();      }

function gate(){
  sub.textContent='Enter your phone to view orders';
  wrap.innerHTML=
    '<div class="ph-gate">'+
      '<div style="font-size:2.5rem;margin-bottom:.5rem">📱</div>'+
      '<h3>View Your Orders</h3>'+
      '<p style="color:var(--text-muted);font-weight:700;font-size:.9rem;margin-bottom:.5rem">Enter the phone number you used when ordering</p>'+
      '<input type="tel" id="ph" placeholder="10-digit phone number" maxlength="10" inputmode="numeric" onkeydown="if(event.key===\'Enter\')go()"/>'+
      '<div id="perr" style="color:#cc0044;font-weight:800;font-size:.85rem;margin-bottom:.5rem;display:none">❌ Enter a valid 10-digit number</div>'+
      '<button onclick="go()" class="btn btn-primary" style="width:100%;padding:.85rem;font-size:1.05rem">🔍 Find My Orders</button>'+
    '</div>';
}

function go(){
  var v=(document.getElementById('ph').value||'').trim();
  if(!v||!/^\d{10}$/.test(v)){document.getElementById('perr').style.display='block';return;}
  document.getElementById('perr').style.display='none';
  load(v);
}

function load(ph){
  // Read from localStorage immediately — no waiting
  var all=[];
  try{ all=JSON.parse(localStorage.getItem('cv_orders')||'[]'); }catch(e){}
  var mine=all.filter(function(o){return o.customer&&o.customer.phone===ph;});
  show(mine,ph);

  // Also try Firebase in background — if it loads, refresh the view
  try{
    if(typeof firebase!=='undefined' && typeof CV_FIREBASE_CONFIG!=='undefined'){
      var cfg=CV_FIREBASE_CONFIG;
      var valid=cfg.apiKey&&cfg.apiKey!=='REPLACE_ME'&&cfg.databaseURL&&cfg.databaseURL!=='REPLACE_ME';
      if(valid){
        if(!firebase.apps||!firebase.apps.length) firebase.initializeApp(cfg);
        firebase.database().ref('orders').orderByChild('timestamp').once('value',function(snap){
          var fbOrders=[];
          snap.forEach(function(ch){fbOrders.push(ch.val());});
          fbOrders.reverse();
          var fbMine=fbOrders.filter(function(o){return o.customer&&o.customer.phone===ph;});
          if(fbMine.length>0) show(fbMine,ph); // update with Firebase data
        });
      }
    }
  }catch(e){}
}

function show(orders,ph){
  if(!orders||!orders.length){
    sub.textContent='No orders found';
    wrap.innerHTML=
      '<div style="text-align:center;padding:4rem 1rem;">'+
        '<div style="font-size:5rem;margin-bottom:1rem;animation:floatBob 2s ease-in-out infinite;">📦</div>'+
        '<h2 style="font-family:\'Fredoka One\',cursive;font-size:2rem;color:var(--text-muted);margin-bottom:.5rem;">No orders yet!</h2>'+
        '<p style="color:var(--text-muted);margin-bottom:.75rem;">Nothing found for <b>'+ph+'</b></p>'+
        '<button onclick="gate()" class="btn btn-secondary" style="margin-right:.5rem">🔄 Try Different Number</button>'+
        '<a href="products.html" class="btn btn-primary">🛍 Shop Now</a>'+
      '</div>';
    return;
  }

  sub.textContent=orders.length+' order'+(orders.length!==1?'s':'')+' · '+ph;
  var spent=orders.reduce(function(s,o){return s+o.total;},0);
  var dlv=orders.filter(function(o){return o.orderStatus==='Delivered';}).length;

  var h=
    '<div class="admin-stats" style="margin-bottom:1.5rem;">'+
      '<div class="stat-card"><span class="stat-value">'+orders.length+'</span><span class="stat-label">Orders</span></div>'+
      '<div class="stat-card"><span class="stat-value">₹'+spent.toLocaleString('en-IN')+'</span><span class="stat-label">Total Spent</span></div>'+
      '<div class="stat-card"><span class="stat-value">'+dlv+'</span><span class="stat-label">Delivered</span></div>'+
    '</div>'+
    '<div style="text-align:right;margin-bottom:1rem;">'+
      '<button onclick="gate()" style="background:none;border:none;cursor:pointer;color:var(--text-muted);font-weight:800;font-size:.82rem;font-family:\'Nunito\',sans-serif;">🔄 Switch Account</button>'+
    '</div>';

  for(var i=0;i<orders.length;i++){
    var o=orders[i];
    var os=o.orderStatus||'Order Placed';
    var ci=0;
    for(var x=0;x<STEPS.length;x++){if(STEPS[x].k===os){ci=x;break;}}
    var isDlv=(os==='Delivered');
    var cs=CHIP[os]||CHIP['Order Placed'];
    var delay=(Math.min(i,8)*0.08).toFixed(2);

    var pLbl=o.paymentStatus==='Paid'
      ?'<span style="color:#00875a;font-weight:800;font-size:.82rem;">✅ Paid</span>'
      :'<span style="color:#b34700;font-weight:800;font-size:.82rem;">🕐 Pay on Delivery</span>';

    // stepper
    var st='<div class="mini-stepper">';
    for(var k=0;k<STEPS.length;k++){
      var sc=k<ci?'sd':(k===ci?'sa':'sp');
      st+='<div class="mini-step '+sc+'"><div class="mini-dot">'+STEPS[k].i+'</div><div class="mini-label">'+STEPS[k].s+'</div></div>';
    }
    st+='</div>';

    // items
    var rows='';
    for(var j=0;j<o.items.length;j++){
      var it=o.items[j];
      rows+='<tr><td>'+(it.emoji||'🍭')+' '+it.name+'</td><td>×'+it.qty+'</td><td>₹'+it.price+'</td><td style="font-weight:800;color:#b34700;">₹'+(it.price*it.qty).toLocaleString('en-IN')+'</td></tr>';
    }
    rows+='<tr><td colspan="3" style="color:var(--text-muted);">🚚 Delivery</td><td style="font-weight:800;color:'+(o.delivery===0?'#00875a':'#b34700')+';">'+(o.delivery===0?'FREE':'₹'+o.delivery)+'</td></tr>';

    var did='d'+o.id.replace(/\W/g,'');

    h+='<div class="order-card" style="animation:cardIn 0.4s ease '+delay+'s both;">';
    h+='<div class="order-header">';
    h+='<div><div class="order-id" style="font-size:.95rem;">🛒 '+o.id+'</div><div class="order-date">📅 '+o.date+'</div></div>';
    h+='<div style="display:flex;flex-direction:column;align-items:flex-end;gap:.4rem;"><div class="order-total-badge">₹'+o.total.toLocaleString('en-IN')+'</div>'+pLbl+'</div>';
    h+='</div>';
    h+='<div class="status-chip" style="'+cs+';">'+STEPS[ci].i+' '+os+'</div>';
    h+=st;
    h+='<a href="order-track.html?id='+o.id+'" class="track-btn'+(isDlv?' dlv':'')+'">'+( isDlv?'🎉 Delivered — View Details':'🚚 Track Your Order  →')+'</a>';
    h+='<button class="tog-btn" onclick="tog(\''+did+'\',this)">▼ View order items</button>';
    h+='<div class="odet" id="'+did+'">';
    h+='<table class="order-items-table" style="margin-top:.6rem;"><thead><tr><th>Item</th><th>Qty</th><th>Unit</th><th>Total</th></tr></thead><tbody>'+rows+'</tbody></table>';
    h+='<div style="font-size:.85rem;color:var(--text-muted);font-weight:600;margin-top:.75rem;line-height:1.6;">📍 '+(o.customer&&o.customer.address||'N/A')+'</div>';
    h+='<div style="margin-top:.75rem;"><a href="products.html" class="btn btn-primary btn-sm">🛍 Shop Again</a></div>';
    h+='</div></div>';
  }

  wrap.innerHTML=h;
}

function tog(id,btn){
  var el=document.getElementById(id); if(!el)return;
  var open=el.classList.toggle('open');
  btn.textContent=open?'▲ Hide order items':'▼ View order items';
}
</script>

<!-- Firebase loaded LAST — optional, page works without it -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="cv-db.js"></script>
</body>
</html>
